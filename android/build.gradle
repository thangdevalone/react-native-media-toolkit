buildscript {
  ext.MediaToolkit = [
    kotlinVersion    : "2.0.21",
    minSdkVersion    : 24,
    compileSdkVersion: 36,
    targetSdkVersion : 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }
    return MediaToolkit[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}

apply plugin: "com.android.library"
apply plugin: "kotlin-android"
apply plugin: "com.facebook.react"

// Apply nitrogen-generated autolinking (adds generated Kotlin sources & C++ sources)
apply from: '../nitrogen/generated/android/MediaToolkit+autolinking.gradle'

android {
  namespace "com.mediatoolkit"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion    getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")
    externalNativeBuild {
      cmake {
        cppFlags "-std=c++20 -frtti -fexceptions"
        abiFilters "arm64-v8a", "x86_64"
      }
    }
  }

  buildFeatures {
    buildConfig true
    prefab true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  kotlinOptions {
    jvmTarget = "1.8"
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
    }
  }


}

dependencies {
  implementation "com.facebook.react:react-android"

  // NitroModules — core JSI binding layer
  implementation "com.margelo.nitro:react-native-nitro-modules:+"

  // Jetpack Media3 Transformer — for video trim, crop, compress
  implementation "androidx.media3:media3-transformer:1.3.1"
  implementation "androidx.media3:media3-effect:1.3.1"
  implementation "androidx.media3:media3-common:1.3.1"

  // ExifInterface — for EXIF rotation on images
  implementation "androidx.exifinterface:exifinterface:1.3.7"

  // Coroutines for background processing
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"
}
